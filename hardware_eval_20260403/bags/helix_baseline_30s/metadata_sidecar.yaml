notes: |
  No /joint_states, /odom, or /tf topics exist on GO2 - it uses custom unitree_go message types
  (e.g., /lowstate, /sportmodestate) which cannot be bagged without the unitree_go package
  installed on the recording machine. Standard nav_msgs/Odometry is available via /utlidar/robot_odom.
  The bag size was 8.2 MiB for ~40 seconds, implying ~1.6 Mbps of standard-type topic data.
  Node discovery (ros2 node list) returns empty from both PC and Jetson, meaning the GO2's
  internal DDS participants are not discoverable - only topics are visible.
