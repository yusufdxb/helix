name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check src/ --select E,F,W,I --ignore E501

  test:
    name: Build & Test (ROS 2 Humble)
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -q
          apt-get install -y python3-pip python3-pytest python3-colcon-common-extensions
          pip install pytest-timeout

      - name: Install Python deps
        run: pip install aiofiles

      - name: Build workspace
        run: |
          . /opt/ros/humble/setup.sh
          colcon build --symlink-install --packages-select \
            helix_msgs helix_core helix_bringup \
            helix_diagnosis helix_recovery helix_explanation

      - name: Run unit tests (helix_core, helix_diagnosis, helix_recovery, helix_explanation)
        run: |
          . /opt/ros/humble/setup.sh
          . install/setup.sh
          python3 -m pytest \
            src/helix_core/test/ \
            src/helix_diagnosis/test/ \
            src/helix_recovery/test/ \
            src/helix_explanation/test/ \
            -v --timeout=30

      - name: Sim-integration harness import check (sim not run in CI)
        run: |
          . /opt/ros/humble/setup.sh
          . install/setup.sh
          pip install rosbags
          python3 -c "import tests.sim_integration.test_lidar_occlusion_recovery"
          python3 -c "import tests.sim_integration.test_rule_r3_log_critical"
          python3 -c "import tests.sim_integration.test_rule_r4_crash_logonly"
