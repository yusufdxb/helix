name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check src/ tests/ --select E,F,W,I --ignore E501

  repo_consistency:
    name: Root tests (repo-integrity, no ROS)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pytest pytest-timeout
      - name: Run root-level pytest
        run: python3 -m pytest tests/ -v --timeout=30

  test:
    name: Build & Test (ROS 2 Humble)
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -q
          apt-get install -y python3-pip python3-pytest \
            python3-colcon-common-extensions \
            ros-humble-diagnostic-msgs \
            ros-humble-sensor-msgs \
            ros-humble-nav-msgs \
            ros-humble-geometry-msgs \
            ros-humble-rclcpp-lifecycle \
            ros-humble-rclcpp-components \
            ros-humble-ament-cmake-gtest
          pip install pytest-timeout aiofiles

      - name: Build workspace
        run: |
          . /opt/ros/humble/setup.sh
          colcon build --symlink-install --packages-select \
            helix_msgs helix_core helix_adapter helix_bringup \
            helix_sensing_cpp \
            helix_diagnosis helix_recovery helix_explanation

      - name: Run unit tests (Python packages)
        run: |
          . /opt/ros/humble/setup.sh
          . install/setup.sh
          python3 -m pytest \
            src/helix_core/test/ \
            src/helix_adapter/test/ \
            src/helix_diagnosis/test/ \
            src/helix_recovery/test/ \
            src/helix_explanation/test/ \
            -v --timeout=30

      - name: Run C++ tests (helix_sensing_cpp)
        run: |
          . /opt/ros/humble/setup.sh
          . install/setup.sh
          colcon test --packages-select helix_sensing_cpp
          colcon test-result --verbose

      - name: Verify launch files import cleanly
        run: |
          . /opt/ros/humble/setup.sh
          . install/setup.sh
          python3 <<'PY'
          import os
          from ament_index_python.packages import get_package_share_directory
          from launch.launch_description_sources import PythonLaunchDescriptionSource

          share = get_package_share_directory("helix_bringup")
          for name in ("helix_sensing.launch.py", "helix_adapter.launch.py"):
              src = PythonLaunchDescriptionSource(os.path.join(share, "launch", name))
              ld = src.try_get_launch_description_without_context()
              assert ld is not None, name
              print(f"OK: {name}")
          PY

      - name: Sim-integration harness import check (sim not run in CI)
        run: |
          . /opt/ros/humble/setup.sh
          . install/setup.sh
          pip install rosbags
          python3 -c "import tests.sim_integration.test_lidar_occlusion_recovery"
          python3 -c "import tests.sim_integration.test_rule_r3_log_critical"
          python3 -c "import tests.sim_integration.test_rule_r4_crash_logonly"
