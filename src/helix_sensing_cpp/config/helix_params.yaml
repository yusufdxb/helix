# AnomalyDetector parameters — shared between the Python (helix_core) and
# C++ (helix_sensing_cpp) implementations. Same param names on both sides.
#
# emit_cooldown_s is new to the C++ port; the Python path ignores unknown
# params (rclpy declare_parameter is opt-in). When ported back to Python
# add the same declaration to helix_core.anomaly_detector.
#
#   zscore_threshold     — |z| above which a sample counts as a violation
#   consecutive_trigger  — number of consecutive violations needed to emit
#   window_size          — rolling window length in samples
#   emit_cooldown_s      — seconds between FaultEvent emissions per metric
#                           (0.0 = legacy Python behavior: emit every sample
#                           once the trigger streak is reached)

helix_anomaly_detector:
  ros__parameters:
    # 3.0 → 4.0 (Session 8, 2026-04-23): idle jitter of /utlidar/robot_odom
    # crossed z=3 repeatedly in steady state. See
    # hardware_eval_20260423/results/closed_loop_demo.md.
    zscore_threshold: 4.0
    consecutive_trigger: 3
    window_size: 60
    emit_cooldown_s: 1.0
    # Minimum seconds an anomaly must persist before emitting a fault.
    # Filters transient idle-jitter spikes while still catching sustained
    # faults. Set to 0.0 to disable (immediate emission, legacy behavior).
    min_anomaly_duration_s: 2.0
