helix_heartbeat_monitor:
  ros__parameters:
    heartbeat_timeout_sec: 0.3
    miss_threshold: 3
    check_interval_sec: 0.5

helix_anomaly_detector:
  ros__parameters:
    # Raised from 3.0 to 4.0 after Session 8 (2026-04-23) hardware data:
    # natural idle jitter of /utlidar/robot_odom crossed z=3 ~6 times in
    # 7 min of standing idle, producing STOP_AND_HOLD hints on noise.
    # Session 8 observed real anomalies land well above 4.0 (z=6.7 IMU,
    # z=5.2 cloud, z=21 startup), so the headroom is real.
    zscore_threshold: 4.0
    consecutive_trigger: 3
    window_size: 60
    # Minimum seconds an anomaly must persist before emitting a fault.
    # Filters transient idle-jitter spikes while still catching sustained
    # faults. Set to 0.0 to disable (immediate emission, legacy behavior).
    min_anomaly_duration_s: 2.0

helix_log_parser:
  ros__parameters:
    dedup_window_sec: 5.0
    # rules_file_path is set programmatically in the launch file
