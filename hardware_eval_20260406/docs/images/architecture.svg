<text x="593" y="242" text-anchor="middle" font-family="monospace" font-size="9" fill="#f59e0b">/helix/faults</text>
<text x="593" y="258" text-anchor="middle" font-family="monospace" font-size="9" fill="#f59e0b">FaultEvent msg</text>

<!-- Arrows from detectors to Fault Bus -->
<line x1="196" y1="241" x2="196" y2="241" stroke="#f59e0b" stroke-width="0.8"/>
<line x1="196" y1="241" x2="538" y2="220" stroke="#f59e0b" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="350" y1="241" x2="538" y2="237" stroke="#f59e0b" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="504" y1="241" x2="538" y2="241" stroke="#f59e0b" stroke-width="0.8" marker-end="url(#arrow)"/>

<!-- FaultEvent structure -->
<rect x="42" y="320" width="596" height="78" rx="8" fill="#0d0f1a" stroke="#2a2d3e" stroke-width="0.6"/>
<text x="56" y="340" font-family="monospace" font-size="10" fill="#64748b">FaultEvent message on /helix/faults</text>

<text x="56" y="360" font-family="monospace" font-size="10" font-weight="600" fill="#ef4444">CRASH</text>
<text x="108" y="360" font-family="monospace" font-size="10" fill="#94a3b8">sev 3 · heartbeat timeout</text>

<text x="310" y="360" font-family="monospace" font-size="10" font-weight="600" fill="#f59e0b">ANOMALY</text>
<text x="382" y="360" font-family="monospace" font-size="10" fill="#94a3b8">sev 2 · Z-score spike</text>

<text x="56" y="380" font-family="monospace" font-size="10" font-weight="600" fill="#3b82f6">LOG_PATTERN</text>
<text x="148" y="380" font-family="monospace" font-size="10" fill="#94a3b8">sev 1-3 · regex match</text>

<text x="310" y="380" font-family="monospace" font-size="10" font-weight="600" fill="#8b5cf6">NETWORK</text>
<text x="382" y="380" font-family="monospace" font-size="10" fill="#94a3b8">sev 2 · DDS discovery loss</text>

<!-- Footer: scope disclaimer -->
<rect x="42" y="418" width="596" height="44" rx="8" fill="none" stroke="#2a2d3e" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="340" y="438" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">Proposed extensions (not implemented): recovery engine, LLM diagnosis,</text>
<text x="340" y="452" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">web dashboard, hardware-specific deployment (GO2 / Jetson)</text>
</svg>
