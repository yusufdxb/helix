<!-- Arrows from nodes down to sensing layer -->
<text x="122" y="143" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">/helix/heartbeat</text>
<line x1="122" y1="128" x2="122" y2="186" stroke="#334155" stroke-width="0.8" marker-end="url(#arrow)"/>

