<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
<rect width="680" height="400" fill="#0f1117" rx="12"/>

<!-- Title -->
<text x="340" y="34" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#e2e8f0">Fault Taxonomy — Implemented Detection</text>
<text x="340" y="52" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">Phase 1 · detection only · no recovery or escalation</text>

<!-- Column headers -->
<text x="90" y="80" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#94a3b8">Fault type</text>
<text x="230" y="80" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#94a3b8">Severity</text>
<text x="380" y="80" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#94a3b8">Trigger</text>
<text x="578" y="80" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#94a3b8">Source</text>
<line x1="42" y1="88" x2="638" y2="88" stroke="#2a2d3e" stroke-width="0.6"/>

<!-- Row 1: CRASH -->
<rect x="42" y="96" width="110" height="40" rx="6" fill="#1f0a0a" stroke="#7f1d1d" stroke-width="0.8"/>
<text x="97" y="120" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#f87171">CRASH</text>
<rect x="176" y="96" width="108" height="40" rx="6" fill="#0d0f1a" stroke="#2a2d3e" stroke-width="0.6"/>
<text x="230" y="120" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#ef4444">3 (critical)</text>
<text x="380" y="120" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Heartbeat timeout exceeded</text>
<text x="578" y="120" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">HeartbeatMonitor</text>

<!-- Row 2: ANOMALY -->
<rect x="42" y="148" width="110" height="40" rx="6" fill="#1a1200" stroke="#78350f" stroke-width="0.8"/>
<text x="97" y="172" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#fbbf24">ANOMALY</text>
<rect x="176" y="148" width="108" height="40" rx="6" fill="#0d0f1a" stroke="#2a2d3e" stroke-width="0.6"/>
<text x="230" y="172" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#f59e0b">2 (warning)</text>
<text x="380" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Z-score threshold exceeded</text>
<text x="578" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">AnomalyDetector</text>

<!-- Row 3: LOG_PATTERN -->
<rect x="42" y="200" width="110" height="40" rx="6" fill="#0c1929" stroke="#1e3a5f" stroke-width="0.8"/>
<text x="97" y="224" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#60a5fa">LOG_PATTERN</text>
<rect x="176" y="200" width="108" height="40" rx="6" fill="#0d0f1a" stroke="#2a2d3e" stroke-width="0.6"/>
<text x="230" y="224" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#94a3b8">1-3 (varies)</text>
<text x="380" y="224" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Regex rule matched in /rosout</text>
<text x="578" y="224" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">LogParser</text>

<!-- Row 4: NETWORK -->
<rect x="42" y="252" width="110" height="40" rx="6" fill="#13092b" stroke="#3b1f5e" stroke-width="0.8"/>
<text x="97" y="276" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#a78bfa">NETWORK</text>
<rect x="176" y="252" width="108" height="40" rx="6" fill="#0d0f1a" stroke="#2a2d3e" stroke-width="0.6"/>
<text x="230" y="276" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#8b5cf6">2 (warning)</text>
<text x="380" y="276" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">DDS discovery loss pattern</text>
<text x="578" y="276" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">LogParser (rules)</text>

<!-- FaultEvent message structure -->
<rect x="42" y="308" width="596" height="52" rx="8" fill="#0d0f1a" stroke="#2a2d3e" stroke-width="0.6"/>
<text x="56" y="326" font-family="monospace" font-size="10" font-weight="600" fill="#64748b">FaultEvent message fields:</text>
<text x="56" y="346" font-family="monospace" font-size="10" fill="#94a3b8">node_name · fault_type · severity · detail · timestamp · context_keys[] · context_values[]</text>

<!-- Footer -->
<text x="340" y="384" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">Detection only. No recovery tiers, no LLM escalation, no automated response.</text>
</svg>
