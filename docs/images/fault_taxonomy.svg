<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect width="680" height="620" fill="#0f1117" rx="12"/>

<!-- Title -->
<text x="340" y="34" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#e2e8f0">Fault taxonomy and recovery ladder</text>
<text x="340" y="52" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">Each fault class escalates through recovery tiers before calling LLM</text>

<!-- Column headers -->
<text x="90" y="78" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#94a3b8">Fault class</text>
<text x="255" y="78" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#94a3b8">Tier 1 — auto</text>
<text x="430" y="78" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#94a3b8">Tier 2 — adaptive</text>
<text x="594" y="78" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="#94a3b8">Tier 3 — LLM</text>
<line x1="42" y1="86" x2="638" y2="86" stroke="#2a2d3e" stroke-width="0.6"/>

<!-- ROW 1: Node crash -->
<rect x="42" y="96" width="110" height="64" rx="8" fill="#1f0a0a" stroke="#7f1d1d" stroke-width="0.8"/>
<text x="97" y="120" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#f87171">Node crash</text>
<text x="97" y="138" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">Process exits</text>
<text x="97" y="152" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">SIGKILL</text>
<line x1="152" y1="128" x2="168" y2="128" stroke="#64748b" stroke-width="0.8" marker-end="url(#arrow)"/>
<rect x="168" y="96" width="160" height="64" rx="8" fill="#0a1f0d" stroke="#14532d" stroke-width="0.8"/>
<text x="248" y="116" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#4ade80">Restart node</text>
<text x="248" y="132" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">ros2 lifecycle restart</text>
<text x="248" y="146" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">max 3 attempts, backoff</text>
<line x1="328" y1="128" x2="344" y2="128" stroke="#64748b" stroke-width="0.8" marker-end="url(#arrow)"/>
<rect x="344" y="96" width="168" height="64" rx="8" fill="#0d0a2b" stroke="#312e81" stroke-width="0.8"/>
<text x="428" y="116" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#818cf8">Fallback mode</text>
<text x="428" y="132" text-anchor="middle" font-family="monospace" font-size="9" fill="#6366f1">Switch to degraded topic</text>
<text x="428" y="146" text-anchor="middle" font-family="monospace" font-size="9" fill="#6366f1">e.g. depth → IMU-only</text>
<line x1="512" y1="128" x2="528" y2="128" stroke="#64748b" stroke-width="0.8" marker-end="url(#arrow)"/>
<rect x="528" y="96" width="100" height="64" rx="8" fill="#0c1929" stroke="#1e3a5f" stroke-width="0.8"/>
<text x="578" y="120" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#60a5fa">LLM</text>
<text x="578" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#3b82f6">diagnosis</text>

<!-- ROW 2: SLAM drift -->
<rect x="42" y="180" width="110" height="64" rx="8" fill="#1f0a0a" stroke="#7f1d1d" stroke-width="0.8"/>
<text x="97" y="204" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#f87171">SLAM drift</text>
<text x="97" y="220" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">Pose covariance</text>
<text x="97" y="234" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">spike</text>
<line x1="152" y1="212" x2="168" y2="212" stroke="#64748b" stroke-width="0.8" marker-end="url(#arrow)"/>
<rect x="168" y="180" width="160" height="64" rx="8" fill="#0a1f0d" stroke="#14532d" stroke-width="0.8"/>
<text x="248" y="200" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#4ade80">Relocalize</text>
<text x="248" y="216" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">Trigger global localization</text>
<text x="248" y="230" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">hold position meanwhile</text>
<line x1="328" y1="212" x2="344" y2="212" stroke="#64748b" stroke-width="0.8" marker-end="url(#arrow)"/>
<rect x="344" y="180" width="168" height="64" rx="8" fill="#0d0a2b" stroke="#312e81" stroke-width="0.8"/>
<text x="428" y="200" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#818cf8">Map reset</text>
<text x="428" y="216" text-anchor="middle" font-family="monospace" font-size="9" fill="#6366f1">Reinit from anchor waypoint</text>
<text x="428" y="230" text-anchor="middle" font-family="monospace" font-size="9" fill="#6366f1">alert operator</text>
<line x1="512" y1="212" x2="528" y2="212" stroke="#64748b" stroke-width="0.8" marker-end="url(#arrow)"/>
<rect x="528" y="180" width="100" height="64" rx="8" fill="#0c1929" stroke="#1e3a5f" stroke-width="0.8"/>
<text x="578" y="204" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#60a5fa">LLM</text>
<text x="578" y="222" text-anchor="middle" font-family="monospace" font-size="10" fill="#3b82f6">diagnosis</text>

<!-- ROW 3: Motor anomaly -->
<rect x="42" y="264" width="110" height="64" rx="8" fill="#1f0a0a" stroke="#7f1d1d" stroke-width="0.8"/>
<text x="97" y="288" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#f87171">Motor anomaly</text>
<text x="97" y="304" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">Torque / temp</text>
<text x="97" y="318" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">outlier</text>
<line x1="152" y1="296" x2="168" y2="296" stroke="#64748b" stroke-width="0.8" marker-end="url(#arrow)"/>
<rect x="168" y="264" width="160" height="64" rx="8" fill="#0a1f0d" stroke="#14532d" stroke-width="0.8"/>
<text x="248" y="284" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#4ade80">Reduce load</text>
<text x="248" y="300" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">Lower velocity limits</text>
<text x="248" y="314" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">flag affected joint</text>
<line x1="328" y1="296" x2="344" y2="296" stroke="#64748b" stroke-width="0.8" marker-end="url(#arrow)"/>
<rect x="344" y="264" width="168" height="64" rx="8" fill="#0d0a2b" stroke="#312e81" stroke-width="0.8"/>
<text x="428" y="284" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#818cf8">Safe mode</text>
<text x="428" y="300" text-anchor="middle" font-family="monospace" font-size="9" fill="#6366f1">Stand still, lock joints</text>
<text x="428" y="314" text-anchor="middle" font-family="monospace" font-size="9" fill="#6366f1">send E-stop signal</text>
<line x1="512" y1="296" x2="528" y2="296" stroke="#64748b" stroke-width="0.8" marker-end="url(#arrow)"/>
<rect x="528" y="264" width="100" height="64" rx="8" fill="#0c1929" stroke="#1e3a5f" stroke-width="0.8"/>
<text x="578" y="288" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#60a5fa">LLM</text>
<text x="578" y="306" text-anchor="middle" font-family="monospace" font-size="10" fill="#3b82f6">diagnosis</text>

<!-- ROW 4: Network drop -->
<rect x="42" y="348" width="110" height="64" rx="8" fill="#1f0a0a" stroke="#7f1d1d" stroke-width="0.8"/>
<text x="97" y="372" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#f87171">Network drop</text>
<text x="97" y="388" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">DDS discovery</text>
<text x="97" y="402" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">loss</text>
<line x1="152" y1="380" x2="168" y2="380" stroke="#64748b" stroke-width="0.8" marker-end="url(#arrow)"/>
<rect x="168" y="348" width="160" height="64" rx="8" fill="#0a1f0d" stroke="#14532d" stroke-width="0.8"/>
<text x="248" y="368" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#4ade80">DDS reconfigure</text>
<text x="248" y="384" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">Restart discovery server</text>
<text x="248" y="398" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">rebind participant</text>
<line x1="328" y1="380" x2="344" y2="380" stroke="#64748b" stroke-width="0.8" marker-end="url(#arrow)"/>
<rect x="344" y="348" width="168" height="64" rx="8" fill="#0d0a2b" stroke="#312e81" stroke-width="0.8"/>
<text x="428" y="368" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#818cf8">Standalone mode</text>
<text x="428" y="384" text-anchor="middle" font-family="monospace" font-size="9" fill="#6366f1">Switch to local-only</text>
<text x="428" y="398" text-anchor="middle" font-family="monospace" font-size="9" fill="#6366f1">no remote dependency</text>
<line x1="512" y1="380" x2="528" y2="380" stroke="#64748b" stroke-width="0.8" marker-end="url(#arrow)"/>
<rect x="528" y="348" width="100" height="64" rx="8" fill="#0c1929" stroke="#1e3a5f" stroke-width="0.8"/>
<text x="578" y="372" text-anchor="middle" font-family="monospace" font-size="12" font-weight="600" fill="#60a5fa">LLM</text>
<text x="578" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#3b82f6">diagnosis</text>

<!-- Legend -->
<rect x="42" y="440" width="596" height="48" rx="8" fill="#0d0f1a" stroke="#2a2d3e" stroke-width="0.6"/>
<rect x="58" y="456" width="14" height="14" rx="3" fill="#1f0a0a" stroke="#7f1d1d" stroke-width="0.8"/>
<text x="78" y="467" font-family="monospace" font-size="10" fill="#94a3b8">Fault class</text>
<rect x="160" y="456" width="14" height="14" rx="3" fill="#0a1f0d" stroke="#14532d" stroke-width="0.8"/>
<text x="180" y="467" font-family="monospace" font-size="10" fill="#94a3b8">Tier 1 — rule-based, &lt;50ms</text>
<rect x="370" y="456" width="14" height="14" rx="3" fill="#0d0a2b" stroke="#312e81" stroke-width="0.8"/>
<text x="390" y="467" font-family="monospace" font-size="10" fill="#94a3b8">Tier 2 — adaptive, &lt;2s</text>
<rect x="528" y="456" width="14" height="14" rx="3" fill="#0c1929" stroke="#1e3a5f" stroke-width="0.8"/>
<text x="548" y="467" font-family="monospace" font-size="10" fill="#94a3b8">Tier 3 — LLM</text>

<!-- Footer -->
<text x="340" y="516" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">Detection latency &lt;300ms  ·  Tier 1 &lt;2s  ·  LLM async (15-45s on Jetson Orin)</text>
<text x="340" y="534" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">github.com/yusufdxb/helix</text>
